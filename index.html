<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avelyst — Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF7F2;--beige:#EDE8DF;--sand:#D6CEBC;--green:#2C4A3E;--green2:#3D6357;--brown:#4A3728;--acc:#8B6F4E;--acc2:#C4956A;--txt:#1A1A1A;--mut:#6B6560}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--green);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--cream);letter-spacing:.1em}
.logo em{font-style:italic;color:var(--acc2)}
.htag{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(250,247,242,.45)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{background:var(--brown);width:190px;flex-shrink:0;overflow-y:auto;padding:16px 0}
.sg{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,247,242,.4);padding:10px 18px 4px}
.sb{display:flex;align-items:center;gap:7px;width:100%;padding:8px 18px;background:none;border:none;border-left:2px solid transparent;color:rgba(250,247,242,.7);font-family:inherit;font-size:12px;cursor:pointer;text-align:left;transition:all .15s}
.sb.active{background:rgba(255,255,255,.1);color:var(--cream);border-left-color:var(--acc2)}
.sb:hover:not(.active){background:rgba(255,255,255,.06);color:var(--cream)}
.main{flex:1;overflow-y:auto;padding:24px 32px 48px}
.ptitle{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--green);margin-bottom:4px}
.pdesc{font-size:12px;color:var(--mut);line-height:1.6;max-width:520px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--beige)}
.notice{background:#E8F0EE;border:1px solid #b2d0c8;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--green);line-height:1.6}
.notice strong{font-weight:500}
.card{background:white;border:1px solid var(--beige);border-radius:12px;margin-bottom:12px;overflow:hidden}
.ch{padding:13px 16px 10px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none}
.cn{font-size:13px;font-weight:500;margin-bottom:2px}
.cs{font-size:11px;color:var(--mut)}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:8px;background:var(--beige);color:var(--acc);font-weight:500}
.arr{color:var(--sand);font-size:14px;transition:transform .2s;flex-shrink:0;margin-top:2px}
.cb{padding:0 16px 16px;border-top:1px solid var(--beige);display:none}
.cb.open{display:block}
.fl{font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin:12px 0 3px;display:block}
input[type=text],textarea,select{width:100%;background:var(--cream);border:1px solid var(--sand);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:12px;color:var(--txt);outline:none;resize:vertical}
textarea{min-height:60px}
.br{display:flex;gap:7px;align-items:center;margin-top:10px;flex-wrap:wrap}
.bgen{background:var(--green);color:var(--cream);border:none;border-radius:6px;padding:8px 18px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer}
.bgen:hover{background:var(--green2)}
.bcopy{background:transparent;color:var(--green);border:1.5px solid var(--green);border-radius:6px;padding:7px 14px;font-family:inherit;font-size:11px;cursor:pointer;display:none}
.bopen{background:var(--acc2);color:white;border:none;border-radius:6px;padding:7px 14px;font-family:inherit;font-size:11px;cursor:pointer;display:none;text-decoration:none;font-weight:500}
.out{margin-top:12px;background:var(--brown);border-radius:9px;padding:14px 16px;display:none}
.ol{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(250,247,242,.45);margin-bottom:7px}
.ot{font-size:12px;color:var(--cream);line-height:1.75;white-space:pre-wrap;word-wrap:break-word;max-height:300px;overflow-y:auto}
.step{margin-top:10px;font-size:11px;color:rgba(250,247,242,.7);line-height:1.6;border-top:1px solid rgba(255,255,255,.1);padding-top:10px}
.step strong{color:var(--acc2)}
</style>
</head>
<body>
<header>
  <div class="logo">AVELYST — <em>Prompt Library</em></div>
  <div class="htag">Phase 1B · Content Factory</div>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>
<script>
const SP = `You are a content strategist and medical copywriter for Avelyst, a physician-led weight management and metabolic health clinic in Bangkok, Thailand.

Founding physician: Dr. Weeraporn Srisung, MD — American Board of Internal Medicine & Nephrology certified, American Board of Obesity Medicine candidate. Mother of three. Warm, direct, evidence-based. Fluent Thai & English.

Target audience: Thai and expat Bangkokians, 40–60, household income 200K+ THB/month, frustrated by failed diets, want evidence-based medical care.

Brand voice: Warm, honest, non-judgmental, conversational — like a brilliant doctor who is also your trusted friend.

Rules: Validate struggle before solutions. Science-backed but simple. Bilingual Thai+English. Never promise rapid results or shame patients. Never attack competitors. Core truth: "It's not your fault — it's your biology. And we can help."

---

`;

const SECTIONS=[
  {id:"hooks",icon:"🪝",label:"Hooks & Openers",group:"Content Creation",desc:"The first 1–2 lines that stop someone scrolling. Your hook = 80% of whether anyone watches the rest."},
  {id:"scripts",icon:"🎬",label:"Video Scripts",group:"Content Creation",desc:"Full Reels/TikTok scripts with hook, body, CTA. Target: 30–90 seconds spoken."},
  {id:"captions",icon:"✍️",label:"Captions",group:"Content Creation",desc:"Bilingual Thai+English captions with hashtags. Storytelling-first, science-backed."},
  {id:"carousels",icon:"📱",label:"Carousel Slides",group:"Content Creation",desc:"Slide-by-slide copy for Instagram/Facebook carousels."},
  {id:"ctas",icon:"📣",label:"CTAs",group:"Conversion",desc:"Calls-to-action for every funnel stage — soft to direct booking."},
  {id:"stories",icon:"💬",label:"Patient Stories",group:"Conversion",desc:"Turn patient journeys into ethical, compelling content."},
  {id:"repurpose",icon:"♻️",label:"Repurpose Content",group:"Research",desc:"One article → 5 posts. Max output, min effort."},
  {id:"research",icon:"🔬",label:"Research → Post",group:"Research",desc:"Convert medical research into accessible, trustworthy content."},
];

const CARDS={
  hooks:[
    {id:"h1",e:"😤",n:"Pain Point Hook",s:"Calls out a specific frustration",tags:["Pillar 1&2","Awareness","High reach"],
     fields:[{id:"pain",l:"The pain point",p:"e.g. ลดน้ำหนักไม่ได้ ทั้งที่กินน้อย ออกกำลังกายทุกวัน"}],
     q:v=>`Write 5 scroll-stopping HOOKS (1-2 lines only) for a video about this pain point: "${v.pain||'[your pain point]'}"\n\nNumbered list. Each hook in Thai with English translation below. Emotionally resonant and specific.`},
    {id:"h2",e:"🔬",n:"Myth-Bust Hook",s:"Challenges a belief with a surprising fact",tags:["Pillar 1","Authority","High shares"],
     fields:[{id:"myth",l:"Common myth",p:"e.g. กินน้อย + ออกกำลังกายมาก = ผอม"},{id:"truth",l:"The truth",p:"e.g. cortisol และ muscle loss ทำให้ metabolism พัง"}],
     q:v=>`Write 5 myth-busting HOOKS.\nMyth: "${v.myth||'[myth]'}"\nTruth: "${v.truth||'[truth]'}"\n\nNumbered list. Thai + English each. Mix styles: question, statement, "stop doing X".`},
    {id:"h3",e:"👩‍⚕️",n:"Doctor's Personal Take Hook",s:'"As a doctor / As a mom of 3..."',tags:["Pillar 3","Trust"],
     fields:[{id:"topic",l:"Topic / opinion",p:"e.g. ทำไมฉันถึงไม่แนะนำ intermittent fasting ให้กับคนไข้ทุกคน"}],
     q:v=>`Write 5 personal-voice HOOKS for Dr. Weeraporn about: "${v.topic||'[topic]'}"\nStart some with "ในฐานะหมอ..." or "ในฐานะแม่ลูก 3..." or "หลังจากดูแลคนไข้มา 10 ปี..."\nNumbered list. Thai + English.`},
    {id:"h4",e:"📊",n:"Statistic / Research Hook",s:"Lead with a surprising number",tags:["Pillar 1","High saves"],
     fields:[{id:"stat",l:"Stat or research finding",p:"e.g. 95% ของคนที่ diet อย่างเดียว จะได้น้ำหนักกลับคืนภายใน 5 ปี"}],
     q:v=>`Write 5 data-driven HOOKS based on: "${v.stat||'[stat]'}"\nMake the number feel surprising and relevant. Numbered list. Thai + English.`},
    {id:"h5",e:"🎯",n:"Audience Identification Hook",s:'"If you\'ve ever..." format',tags:["All pillars","High engagement"],
     fields:[{id:"situation",l:"Situation to identify with",p:"e.g. พยายามลดน้ำหนักมาหลายปีแต่ไม่สำเร็จ"}],
     q:v=>`Write 5 identification HOOKS for: "${v.situation||'[situation]'}"\nStart with "ถ้าคุณเคย..." or "คุณเป็นคนที่..." Numbered list. Thai + English. Make viewers feel deeply understood.`},
  ],
  scripts:[
    {id:"s1",e:"🎓",n:"Educational Explainer Script",s:"Explain a medical concept simply",tags:["Pillar 1","Authority"],
     fields:[{id:"topic",l:"Topic",p:"e.g. Insulin resistance"},{id:"length",l:"Length",type:"select",opts:["30 seconds","60 seconds","90 seconds"],def:"60 seconds"},{id:"msg",l:"Key message",p:"e.g. อาหารที่คุณกินไม่ใช่ปัญหาเดียว — ฮอร์โมนต่างหากที่ต้องแก้"}],
     q:v=>`Write a ${v.length||'60 seconds'} spoken video script explaining: "${v.topic||'[topic]'}"\nKey message: "${v.msg||'[message]'}"\nStructure: [HOOK] → problem setup → simple analogy → [TAKEAWAY] → [CTA]\nThai spoken language + English translation at end.`},
    {id:"s2",e:"🔥",n:"Myth-Busting Script",s:"Debunk a health belief with evidence",tags:["Pillar 1","High shares"],
     fields:[{id:"myth",l:"The myth",p:"e.g. ออกกำลังกาย cardio เยอะๆ คือวิธีลดน้ำหนักที่ดีที่สุด"},{id:"truth",l:"The truth",p:"e.g. Weight training เพิ่ม resting metabolism ได้ดีกว่า"}],
     q:v=>`Write a 60-second myth-busting video script.\nMyth: "${v.myth||'[myth]'}"\nTruth: "${v.truth||'[truth]'}"\nStructure: Strong hook → State myth → "Here's what science says" → Explanation → Practical implication → CTA\nThai spoken + English at end.`},
    {id:"s3",e:"💡",n:"Tip List Script",s:'"5 things..." — high save rate',tags:["Pillar 2","High saves"],
     fields:[{id:"topic",l:"Topic",p:"e.g. นิสัยที่ทำให้ metabolism ดีขึ้น"},{id:"num",l:"Number of tips",type:"select",opts:["3","5","7"],def:"5"}],
     q:v=>`Write a "${v.num||'5'} things about ${v.topic||'[topic]'}" video script, 45–60 seconds.\nStructure: Hook → Intro → Each point with 1-sentence explanation → Strong closing + CTA\nThai energetic and warm + English at end.`},
    {id:"s4",e:"🩺",n:"Doctor's Story Script",s:"Personal perspective from Dr. Weeraporn",tags:["Pillar 3","Personal brand"],
     fields:[{id:"topic",l:"Story or opinion topic",p:"e.g. ทำไมฉันถึงเปิดคลินิก weight management"},{id:"emo",l:"Key emotion to evoke",p:"e.g. ความหวัง, การได้รับ validation"}],
     q:v=>`Write a personal video script from Dr. Weeraporn about: "${v.topic||'[topic]'}"\nEmotion: "${v.emo||'[emotion]'}"\nFirst person, honest, like talking to a friend.\nStructure: Personal hook → Story → Insight → Connection to Avelyst → Warm CTA\nThai conversational + English at end.`},
  ],
  captions:[
    {id:"c1",e:"📖",n:"Educational Caption (Pillar 1)",s:"Science-backed post with a clear takeaway",tags:["Pillar 1","High saves"],
     fields:[{id:"topic",l:"Topic",p:"e.g. GLP-1 medications และวิธีที่มันทำงาน"},{id:"tkwy",l:"Key takeaway",p:"e.g. ยาไม่ใช่ทางลัด — มันช่วยให้ body ทำงานได้ถูกต้อง"}],
     q:v=>`Write a bilingual Instagram caption about: "${v.topic||'[topic]'}"\nKey takeaway: "${v.tkwy||'[takeaway]'}"\nThai (150-200 words): storytelling opener → science → practical takeaway → soft CTA\nEnglish (100-150 words): same\n15 hashtags (mix Thai + English)`},
    {id:"c2",e:"💪",n:"Tip Caption (Pillar 2)",s:"Practical and inspiring with a real tip",tags:["Pillar 2","Inspiration"],
     fields:[{id:"tip",l:"Tip or transformation theme",p:"e.g. การเพิ่ม protein ทุกมื้อเปลี่ยน body composition อย่างไร"}],
     q:v=>`Bilingual Instagram caption about: "${v.tip||'[tip]'}"\nThai (150 words): relatable opening → tip with WHY → encouragement → CTA to save\nEnglish (100 words)\n15 hashtags`},
    {id:"c3",e:"🧡",n:"Doctor's Personal Caption (Pillar 3)",s:"First-person post from Dr. Weeraporn",tags:["Pillar 3","Personal brand"],
     fields:[{id:"share",l:"What do you want to share?",ta:true,p:"e.g. ฉันเป็นหมอที่ดูแลคนไข้ ICU มาหลายปี และสิ่งที่ทำให้ฉันเปิดคลินิกนี้คือ..."}],
     q:v=>`Bilingual first-person caption from Dr. Weeraporn:\n"${v.share||'[your message]'}"\nThai (150-200 words): personal, warm, use "ฉัน", end with reflection\nEnglish (100 words)\n12 hashtags\nFeel real, not corporate.`},
    {id:"c4",e:"🏥",n:"Service Caption (Pillar 4)",s:"Introduce a service — warm, not salesy",tags:["Pillar 4","Conversion"],
     fields:[{id:"service",l:"Service to highlight",p:"e.g. Initial consultation + metabolic assessment"},{id:"action",l:"Desired action",p:"e.g. DM หรือ LINE เพื่อนัดพบ"}],
     q:v=>`Bilingual service caption.\nService: "${v.service||'[service]'}"\nAction: "${v.action||'[action]'}"\nThai (120-150 words): value-first → what patient gets → warm CTA\nEnglish (80-100 words)\n12 hashtags\nFeel like an invitation, not a sale.`},
  ],
  carousels:[
    {id:"cr1",e:"🧠",n:"Educational Carousel",s:"Teach something valuable, slide by slide",tags:["Pillar 1&2","High saves"],
     fields:[{id:"topic",l:"Topic",p:"e.g. ทำไม metabolism ถึงช้าลงเมื่ออายุมากขึ้น"},{id:"slides",l:"Slides",type:"select",opts:["5 slides","7 slides","9 slides"],def:"7 slides"}],
     q:v=>`Create a ${v.slides||'7 slides'} Instagram carousel about: "${v.topic||'[topic]'}"\nEach slide:\nSLIDE X — [HEADLINE max 8 words]\n[BODY 2-3 sentences]\nSlide 1 = hook/cover. Last slide = CTA.\nThai + English per slide.`},
    {id:"cr2",e:"✅",n:"Checklist Carousel",s:'"X warning signs / tips" — highest save rate',tags:["Pillar 2","Viral potential"],
     fields:[{id:"topic",l:"Topic",p:"e.g. 7 สัญญาณที่บอกว่า metabolism ของคุณมีปัญหา"},{id:"fmt",l:"Format",type:"select",opts:["Things to DO","Things to AVOID","Warning signs","Questions to ask"],def:"Warning signs"}],
     q:v=>`Create a checklist carousel: "${v.topic||'[topic]'}" (Format: ${v.fmt||'Warning signs'})\nEach slide:\nSLIDE X — [ITEM]\n[1-2 sentence explanation]\n[English translation]\nSlide 1 = cover. Last = CTA.`},
    {id:"cr3",e:"🌟",n:"Patient Journey Carousel",s:"Struggle → discovery → transformation",tags:["Pillar 2&4","Conversion"],
     fields:[{id:"profile",l:"Patient profile (anonymised)",ta:true,p:"e.g. ผู้หญิงอายุ 45 ปี ลูก 2 คน พยายามลดน้ำหนักมา 5 ปี เพราะ insulin resistance"}],
     q:v=>`Patient journey carousel:\n"${v.profile||'[patient profile]'}"\nSlides: 1.Hook 2.Background 3.Turning point 4.Starting Avelyst 5.Progress 6.Result 7.Their words 8.CTA\nThai + English each. Warm, honest, never over-promise.`},
  ],
  ctas:[
    {id:"cta1",e:"💬",n:"Soft CTA (Save / Comment)",s:"Awareness stage — low commitment",tags:["Awareness","Engagement"],
     fields:[{id:"topic",l:"Post topic",p:"e.g. โพสต์เกี่ยวกับทำไม diet อย่างเดียวถึงไม่ work"}],
     q:v=>`Write 5 soft CTAs for a post about: "${v.topic||'[topic]'}"\nAsk for low-commitment actions (save, comment, share, follow).\nNumbered list. Thai + English. Natural, varied styles.`},
    {id:"cta2",e:"📩",n:"Medium CTA (DM / LINE)",s:"Invite a conversation",tags:["Interest","Lead gen"],
     fields:[{id:"about",l:"What should they message about?",p:"e.g. ถามเกี่ยวกับ initial consultation"}],
     q:v=>`Write 5 medium CTAs inviting DM or LINE about: "${v.about||'[topic]'}"\nNumbered list. Thai + English. Warm — feel like a natural next step.`},
    {id:"cta3",e:"📅",n:"Direct Booking CTA",s:"Clear, warm, specific",tags:["Conversion","Booking"],
     fields:[{id:"service",l:"Service",p:"e.g. Initial consultation + metabolic assessment"},{id:"urgency",l:"Urgency (optional)",p:"e.g. รับจำนวนจำกัด"}],
     q:v=>`Write 5 direct booking CTAs.\nService: "${v.service||'[service]'}"\nUrgency: "${v.urgency||'none'}"\nNumbered list. Thai + English. Make booking feel like a self-care decision.`},
    {id:"cta4",e:"🔁",n:"Loyalty / Referral CTA",s:"Encourage sharing",tags:["Loyalty","Word of mouth"],
     fields:[{id:"ctx",l:"Context / milestone",p:"e.g. คนไข้ที่ลดน้ำหนักได้ตามเป้า"}],
     q:v=>`Write 5 loyalty/referral CTAs. Context: "${v.ctx||'[context]'}"\nNumbered list. Thai + English. Celebratory and grateful.`},
  ],
  stories:[
    {id:"ps1",e:"📝",n:"Patient Story — Caption",s:"150–200 word story for feed post",tags:["Pillar 2","Social proof"],
     fields:[{id:"bg",l:"Patient background (anonymised)",ta:true,p:"e.g. หญิง 48 ปี บริหาร มีเบาหวาน ลองลดน้ำหนักมาหลายปี..."},{id:"result",l:"Key result",p:"e.g. หลัง 3 เดือน น้ำหนักลด 8 กก."}],
     q:v=>`Write a 150-200 word patient story caption.\nBackground: "${v.bg||'[background]'}"\nResult: "${v.result||'[result]'}"\nStructure: Relatable opening → Struggle → Shift → Result → Takeaway → Soft CTA\nThai first, English below. Completely anonymised.`},
    {id:"ps2",e:"🎥",n:"Patient Story — Video Script",s:"Script for doctor to narrate",tags:["Pillar 2&3","High conversion"],
     fields:[{id:"story",l:"Patient story details",ta:true,p:"e.g. ชาย 52 ปี น้ำหนัก 110 กก. มีความดันและไขมันสูง..."}],
     q:v=>`Write a 60-90 second doctor-narrated video script.\nStory: "${v.story||'[story]'}"\nDr. Weeraporn tells in first person. Warm, empathetic, ends with gentle CTA.\nThai spoken + English at end.`},
    {id:"ps3",e:"💌",n:"Testimonial Polish",s:"Raw review → publishable content",tags:["Pillar 4","Trust"],
     fields:[{id:"raw",l:"Raw review text",ta:true,p:"วางรีวิวดิบๆ ที่นี่..."}],
     q:v=>`Polish this raw testimonial: "${v.raw||'[testimonial]'}"\n1. Quote card text (1-2 sentences, most impactful)\n2. Full caption (120 words, Thai + English)\n3. 10 suggested hashtags`},
  ],
  repurpose:[
    {id:"rp1",e:"📄",n:"Article → 5 Social Posts",s:"One article, five formats",tags:["All pillars","High efficiency"],
     fields:[{id:"article",l:"Paste article / blog text",ta:true,p:"วาง article หรือสรุปงานวิจัยที่นี่..."}],
     q:v=>`Repurpose this into 5 social media posts:\n"${v.article||'[article]'}"\n1. Carousel cover hook (1 line, Thai)\n2. Educational caption (Thai + English)\n3. Myth-bust angle\n4. Tip list (3 tips)\n5. Doctor's opinion take\nLabel each clearly.`},
    {id:"rp2",e:"🎙️",n:"Video Transcript → Caption + Carousel",s:"Reel transcript → written content",tags:["All pillars"],
     fields:[{id:"trans",l:"Paste video transcript",ta:true,p:"วาง transcript ของ video ที่นี่..."}],
     q:v=>`Repurpose this transcript:\n"${v.trans||'[transcript]'}"\n1. Instagram caption (Thai + English, 150 words)\n2. 7-slide carousel (title + 2-sentence body each)\n3. 3 hook variations\nLabel each clearly.`},
    {id:"rp3",e:"🔬",n:"Research Paper → Patient Post",s:"Complex studies → shareable content",tags:["Pillar 1","Authority"],
     fields:[{id:"res",l:"Research findings (abstract)",ta:true,p:"e.g. Study: Semaglutide reduced body weight by 15%..."}],
     q:v=>`Translate this research into patient-friendly content:\n"${v.res||'[research]'}"\n1. Thai caption (150 words): hook → explain simply → takeaway\n2. English caption (100 words)\n3. Key message in 1 line\n4. 3-slide carousel mini-version`},
  ],
  research:[
    {id:"re1",e:"📚",n:"Guideline Summary Post",s:"Clinical guidelines → patient post",tags:["Pillar 1","Authority"],
     fields:[{id:"gl",l:"Guideline / recommendation",ta:true,p:"e.g. AHA 2023: 150 min moderate activity/week..."},{id:"fmt",l:"Format",type:"select",opts:["Instagram caption","Carousel (5 slides)","Both caption + carousel","Short video script"],def:"Both caption + carousel"}],
     q:v=>`Convert this guideline into patient-friendly content:\n"${v.gl||'[guideline]'}"\nFormat: ${v.fmt||'Both caption + carousel'}\nThai + English. Clear, actionable, non-intimidating.`},
    {id:"re2",e:"⚖️",n:"Balanced Medical Opinion Post",s:"Trending topic with nuance",tags:["Pillar 1&3","High engagement"],
     fields:[{id:"topic",l:"Trending topic / controversy",p:"e.g. Ozempic สำหรับคนที่ไม่ได้เป็นเบาหวาน"},{id:"stance",l:"Dr. Weeraporn's stance",ta:true,p:"e.g. มีประโยชน์ในผู้ที่มีข้อบ่งชี้ที่เหมาะสม แต่ต้องอยู่ภายใต้การดูแลของแพทย์"}],
     q:v=>`Write a balanced medical opinion post on: "${v.topic||'[topic]'}"\nStance: "${v.stance||'[stance]'}"\nStructure: Hook → What science says → Her nuanced opinion → What this means for patients → Gentle CTA\nBilingual Thai + English.`},
  ],
};

let active='hooks';

function render(){
  const groups=[...new Set(SECTIONS.map(s=>s.group))];
  document.getElementById('sidebar').innerHTML=groups.map(g=>`
    <div class="sg">${g}</div>
    ${SECTIONS.filter(s=>s.group===g).map(s=>`
      <button class="sb ${s.id===active?'active':''}" onclick="switchSection('${s.id}')">${s.icon} ${s.label}</button>
    `).join('')}
  `).join('');
  const sec=SECTIONS.find(s=>s.id===active);
  const cards=CARDS[active]||[];
  document.getElementById('main').innerHTML=`
    <div class="ptitle">${sec.label}</div>
    <div class="pdesc">${sec.desc}</div>
    <div class="notice">
      <strong>How to use:</strong> Fill in the fields → click <strong>Build Prompt</strong> → the full prompt appears below → click <strong>Copy</strong> → paste into <a href="https://claude.ai" target="_blank" style="color:var(--green);font-weight:500">claude.ai</a> → get your content instantly.
    </div>
    ${cards.map(c=>cardHTML(c)).join('')}
  `;
}

function cardHTML(c){
  return `<div class="card" id="card-${c.id}">
    <div class="ch" onclick="toggleCard('${c.id}')">
      <span style="font-size:18px">${c.e}</span>
      <div style="flex:1">
        <div class="cn">${c.n}</div>
        <div class="cs">${c.s}</div>
        <div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <span class="arr" id="arr-${c.id}">▾</span>
    </div>
    <div class="cb" id="cb-${c.id}">
      ${c.fields.map(f=>`
        <label class="fl">${f.l}</label>
        ${f.ta?`<textarea id="f-${c.id}-${f.id}" placeholder="${f.p}"></textarea>`
          :f.type==='select'?`<select id="f-${c.id}-${f.id}">${(f.opts||[]).map(o=>`<option ${o===f.def?'selected':''}>${o}</option>`).join('')}</select>`
          :`<input type="text" id="f-${c.id}-${f.id}" placeholder="${f.p}">`}
      `).join('')}
      <div class="br">
        <button class="bgen" onclick="buildPrompt('${c.id}')">✦ Build Prompt</button>
        <button class="bcopy" id="copy-${c.id}" onclick="copyOut('${c.id}')">Copy Prompt</button>
        <a class="bopen" id="open-${c.id}" href="https://claude.ai/new" target="_blank">Open Claude.ai →</a>
      </div>
      <div class="out" id="out-${c.id}">
        <div class="ol">Your Ready-to-Use Prompt</div>
        <div class="ot" id="ot-${c.id}"></div>
        <div class="step">
          <strong>Next step:</strong> Click <strong>Copy Prompt</strong> above → go to <a href="https://claude.ai/new" target="_blank" style="color:var(--acc2)">claude.ai</a> → paste → send. Done! ✓
        </div>
      </div>
    </div>
  </div>`;
}

function switchSection(id){active=id;render();}

function toggleCard(id){
  const cb=document.getElementById('cb-'+id);
  const arr=document.getElementById('arr-'+id);
  const open=cb.classList.toggle('open');
  arr.style.transform=open?'rotate(180deg)':'none';
}

function buildPrompt(id){
  const card=Object.values(CARDS).flat().find(c=>c.id===id);
  if(!card)return;
  const vals={};
  card.fields.forEach(f=>{
    const el=document.getElementById(`f-${id}-${f.id}`);
    if(el)vals[f.id]=el.value;
  });
  const fullPrompt=SP+card.q(vals);
  document.getElementById('ot-'+id).textContent=fullPrompt;
  document.getElementById('out-'+id).style.display='block';
  document.getElementById('copy-'+id).style.display='inline-block';
  document.getElementById('open-'+id).style.display='inline-block';
}

function copyOut(id){
  const txt=document.getElementById('ot-'+id).textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('copy-'+id);
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy Prompt',1500);
  });
}

render();
</script>
</body>
</html>
