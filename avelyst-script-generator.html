<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avelyst — Script Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--beige:#EDE8DF;--sand:#D6CEBC;--green:#2C4A3E;--green2:#3D6357;--brown:#4A3728;--acc:#8B6F4E;--acc2:#C4956A;--txt:#1A1A1A;--mut:#6B6560}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);min-height:100vh;padding:32px 20px 60px}
.wrap{max-width:720px;margin:0 auto}

/* HEADER */
.hdr{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--beige);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--green)}
.logo em{font-style:italic;color:var(--acc2)}
.sub{font-size:10px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}

/* API KEY BANNER */
.api-banner{background:white;border:1px solid var(--beige);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.api-banner.saved{border-color:#b2d0c8;background:#E8F0EE}
.api-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);flex-shrink:0}
.api-input{flex:1;min-width:200px;background:var(--cream);border:1px solid var(--sand);border-radius:7px;padding:8px 12px;font-family:'DM Sans',monospace;font-size:12px;color:var(--txt);outline:none}
.api-input:focus{border-color:var(--green)}
.api-save{background:var(--green);color:var(--cream);border:none;border-radius:7px;padding:8px 18px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0}
.api-save:hover{background:var(--green2)}
.api-status{font-size:12px;color:var(--green2);font-weight:500;flex-shrink:0;display:none}
.api-note{font-size:11px;color:var(--mut);width:100%;line-height:1.5;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.tb{padding:6px 14px;border-radius:20px;border:1px solid var(--sand);background:white;font-family:inherit;font-size:12px;cursor:pointer;color:var(--mut);transition:all .15s}
.tb.on{background:var(--green);color:var(--cream);border-color:var(--green);font-weight:500}
.tb:hover:not(.on){background:var(--beige)}

/* CARD */
.card{background:white;border:1px solid var(--beige);border-radius:14px;padding:24px}
.pill{display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;font-weight:500;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.p1{background:#E8F0EE;color:#2C4A3E}.p2{background:#F0EBE6;color:#4A3728}
.p3{background:#EAF0E8;color:#3A5438}.p4{background:#F0EBE0;color:#5A4030}
.card-desc{font-size:13px;color:var(--mut);margin-bottom:18px;line-height:1.5}
.fields{display:grid;gap:11px}
.fields.two{grid-template-columns:1fr 1fr}
.fl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);display:block;margin-bottom:4px}
input[type=text],select{width:100%;background:var(--cream);border:1px solid var(--sand);border-radius:7px;padding:9px 12px;font-family:inherit;font-size:13px;color:var(--txt);outline:none}
input:focus,select:focus{border-color:var(--green)}

/* BUTTONS */
.btn-row{display:flex;gap:8px;align-items:center;margin-top:18px;flex-wrap:wrap}
.btn-gen{background:var(--green);color:var(--cream);border:none;border-radius:7px;padding:10px 24px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
.btn-gen:hover:not(:disabled){background:var(--green2)}
.btn-gen:disabled{opacity:.4;cursor:not-allowed}
.btn-copy{background:transparent;color:var(--green);border:1.5px solid var(--green);border-radius:7px;padding:9px 18px;font-family:inherit;font-size:12px;cursor:pointer;display:none}
.btn-copy:hover{background:var(--beige)}
.loading{font-size:12px;color:var(--mut);font-style:italic;margin-top:8px;display:none}

/* OUTPUT */
.output{margin-top:16px;background:var(--green);border-radius:12px;padding:18px 20px;display:none}
.out-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(250,247,242,.45);margin-bottom:10px}
.out-text{font-size:13px;color:var(--cream);line-height:1.8;white-space:pre-wrap;word-wrap:break-word;max-height:520px;overflow-y:auto}

/* ERROR */
.error-box{margin-top:14px;background:#FDF0EE;border:1px solid #f5c4b3;border-radius:10px;padding:14px 16px;display:none}
.error-box p{font-size:12px;color:var(--brown);line-height:1.6}
.error-box a{color:var(--green);font-weight:500}

.tip{margin-top:12px;font-size:11px;color:var(--mut);background:var(--beige);border-radius:7px;padding:9px 12px;line-height:1.5}

@media(max-width:560px){
  .fields.two{grid-template-columns:1fr}
  .hdr{flex-direction:column}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div>
      <div class="logo">AVELYST — <em>Script Generator</em></div>
      <div class="sub">Phase 2A · Content Production Engine</div>
    </div>
  </div>

  <!-- API KEY BANNER -->
  <div class="api-banner" id="apiBanner">
    <span class="api-label">🔑 API Key</span>
    <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-api03-...  (paste your Anthropic API key)">
    <button class="api-save" onclick="saveKey()">Save</button>
    <span class="api-status" id="apiStatus">✓ Key saved</span>
    <div class="api-note">Your key is stored only in your browser (localStorage). It never leaves your device. Get your key at <a href="https://platform.anthropic.com/api-keys" target="_blank" style="color:var(--green);font-weight:500">platform.anthropic.com/api-keys</a></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tb on" onclick="sw('edu',this)">📚 Educational</button>
    <button class="tb" onclick="sw('myth',this)">🔥 Myth-Bust</button>
    <button class="tb" onclick="sw('tips',this)">💡 Tip List</button>
    <button class="tb" onclick="sw('story',this)">🩺 Doctor's Story</button>
    <button class="tb" onclick="sw('patient',this)">❤️ Patient Journey</button>
    <button class="tb" onclick="sw('service',this)">🏥 Service Intro</button>
  </div>

  <div id="form-area"></div>

</div>

<script>
const SP = `You are writing a video script for Avelyst — a physician-led weight management and metabolic health clinic in Bangkok.

Doctor: Dr. Weeraporn Srisung MD. American Board of Internal Medicine & Nephrology certified. American Board of Obesity Medicine candidate. Mother of 3. Warm, direct, bilingual Thai/English.

Audience: Thai & expat Bangkokians 40–60, household income 200K+ THB/month. Frustrated by failed diets. Want evidence-based medical care.

Voice: Warm, honest, non-judgmental. Validate struggle first. Science-backed but simple. Never shame or promise rapid results. Core truth: "It's not your fault — it's your biology. And we can help."

Format: Thai main + full English translation at end. Label sections: [HOOK] [BODY] [TAKEAWAY] [CTA]. Natural spoken language.

`;

const TYPES = {
  edu:{l:'Educational Explainer',p:1,c:'p1',d:'Explain a medical concept simply — builds authority (Pillar 1)',
    f:[{i:'topic',l:'Topic / concept',ph:'e.g. Insulin resistance และทำไมถึงทำให้ลดน้ำหนักยาก'},
       {i:'len',l:'Length',s:['30 seconds','60 seconds','90 seconds'],def:'60 seconds'},
       {i:'msg',l:'Key takeaway for viewer',ph:'e.g. ปัญหาไม่ใช่ willpower — มันคือฮอร์โมน'}],
    q:v=>`${SP}Write a ${v.len||'60 seconds'} educational Reel script about: "${v.topic}"\nKey takeaway: "${v.msg}"\n\n[HOOK] Surprising or validating opener (1-2 sentences)\n[BODY] Simple explanation with analogy, 2-3 points max\n[TAKEAWAY] One clear actionable insight\n[CTA] Soft — save/follow/DM\n\nThen full English translation.`},
  myth:{l:'Myth-Bust',p:1,c:'p1',d:'Debunk a common belief with evidence — high share rate',
    f:[{i:'myth',l:'The myth',ph:'e.g. ออกกำลังกาย cardio ทุกวันคือวิธีที่ดีที่สุด'},
       {i:'truth',l:'The scientific truth',ph:'e.g. Weight training เพิ่ม resting metabolism ได้มากกว่า'},
       {i:'why',l:'Why myth is common (optional)',ph:'e.g. เพราะ cardio เห็นผลเร็วในระยะแรก'}],
    q:v=>`${SP}Write a 60-second myth-busting Reel script.\nMyth: "${v.myth}"\nTruth: "${v.truth}"\nWhy myth persists: "${v.why||'not specified'}"\n\n[HOOK] State myth then flip it\n[BODY] "Here's what science says..." + simple analogy\n[TAKEAWAY] Practical implication for viewer\n[CTA] Invite comment or save\n\nFull English translation.`},
  tips:{l:'Tip List',p:2,c:'p2',d:'"5 things that…" format — highest save rate (Pillar 2)',
    f:[{i:'topic',l:'Tip topic',ph:'e.g. นิสัยที่ช่วยให้ metabolism ดีขึ้นโดยไม่ต้องออกกำลังกายหนัก'},
       {i:'num',l:'Number of tips',s:['3','5','7'],def:'5'},
       {i:'for',l:'Who is this for?',ph:'e.g. คนที่ไม่มีเวลา, แม่ที่ดูแลลูก'}],
    q:v=>`${SP}Write a "${v.num||'5'} things" Reel script about: "${v.topic}"\nFor: "${v.for||'general audience'}"\n\n[HOOK] Open with who this is for and why they need it\n[BODY] Each tip + 1-sentence "why it works" — feel like insider knowledge\n[TAKEAWAY] Reinforce the overall message\n[CTA] "Save this for when you need it"\n\nFull English translation.`},
  story:{l:"Doctor's Story",p:3,c:'p3',d:'Personal perspective from Dr. Weeraporn — builds personal brand (Pillar 3)',
    f:[{i:'topic',l:'Story or opinion topic',ph:'e.g. ทำไมฉันถึงเปิดคลินิก weight management'},
       {i:'emo',l:'Emotion to leave viewer with',ph:'e.g. ความหวัง, ความรู้สึกว่ามีคนเข้าใจ'},
       {i:'pers',l:'Personal element (optional)',ph:'e.g. ประสบการณ์จาก ICU, ชีวิตแม่ลูก 3 คน'}],
    q:v=>`${SP}Write a personal 60-second Reel script from Dr. Weeraporn's POV.\nTopic: "${v.topic}"\nEmotion: "${v.emo||'hope and validation'}"\nPersonal element: "${v.pers||'doctor and mother of 3'}"\n\n[HOOK] Personal moment or confession — not a question\n[BODY] Short honest story. First person "ฉัน". Friend not lecturer.\n[TAKEAWAY] Insight viewers carry with them\n[CTA] Soft, genuine — not a sale\n\nFull English translation.`},
  patient:{l:'Patient Journey',p:2,c:'p2',d:'Real transformation — doctor narrates (always anonymised)',
    f:[{i:'profile',l:'Patient profile (anonymised)',ph:'e.g. หญิง 47 ปี มีเบาหวาน ลองลดน้ำหนักมา 5 ปีไม่สำเร็จ'},
       {i:'root',l:'Root cause discovered',ph:'e.g. Insulin resistance รุนแรงที่ไม่ได้รับการรักษา'},
       {i:'result',l:'Outcome / result',ph:'e.g. ลด 9 กก. ใน 4 เดือน HbA1c ลดจาก 7.8 เป็น 6.2'}],
    q:v=>`${SP}Write a 75-second patient journey Reel narrated by Dr. Weeraporn ("ฉันมีคนไข้คนหนึ่ง...").\nPatient: "${v.profile}"\nRoot cause: "${v.root}"\nOutcome: "${v.result}"\n\n[HOOK] Patient's frustration — relatable\n[BODY] Discovery → why previous attempts failed → what changed\n[TAKEAWAY] It wasn't her fault — it was biology\n[CTA] Gentle invite to consult\n\nCompletely anonymised. Full English translation.`},
  service:{l:'Service Intro',p:4,c:'p4',d:'Introduce a service — warm, never pushy (Pillar 4)',
    f:[{i:'svc',l:'Service to introduce',ph:'e.g. Initial consultation + metabolic assessment'},
       {i:'pain',l:'Pain point it solves',ph:'e.g. ไม่รู้ว่า metabolism ของตัวเองมีปัญหาอะไร'},
       {i:'cta',l:'Desired action',ph:'e.g. DM หรือ LINE @avelyst'}],
    q:v=>`${SP}Write a 45-second service intro Reel for: "${v.svc}"\nPain point: "${v.pain}"\nAction: "${v.cta||'DM or LINE to book'}"\n\n[HOOK] Start with patient's feeling — not service name\n[BODY] What we do simply + what makes it different\n[TAKEAWAY] One-line reason to act\n[CTA] Warm, specific, no pressure\n\nFull English translation.`},
};

let cur = 'edu';

// Load saved key
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('avelyst_api_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apiStatus').style.display = 'inline';
    document.getElementById('apiBanner').classList.add('saved');
  }
  render();
});

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('avelyst_api_key', key);
  document.getElementById('apiStatus').style.display = 'inline';
  document.getElementById('apiBanner').classList.add('saved');
  const btn = event.currentTarget;
  btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = 'Save', 1500);
}

function getKey() {
  return localStorage.getItem('avelyst_api_key') || document.getElementById('apiKeyInput').value.trim();
}

function sw(t, btn) {
  cur = t;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function getVals() {
  const v = {};
  TYPES[cur].f.forEach(f => {
    const el = document.getElementById('fi-' + f.i);
    if (el) v[f.i] = el.value;
  });
  return v;
}

function render() {
  const T = TYPES[cur];
  const fhtml = T.f.map(f => `
    <div>
      <label class="fl">${f.l}</label>
      ${f.s
        ? `<select id="fi-${f.i}">${f.s.map(o=>`<option${o===f.def?' selected':''}>${o}</option>`).join('')}</select>`
        : `<input type="text" id="fi-${f.i}" placeholder="${f.ph}">`}
    </div>`).join('');

  document.getElementById('form-area').innerHTML = `
    <div class="card">
      <span class="pill ${T.c}">Pillar ${T.p} — ${T.l}</span>
      <div class="card-desc">${T.d}</div>
      <div class="fields ${T.f.length >= 2 ? 'two' : ''}">${fhtml}</div>
      <div class="btn-row">
        <button class="btn-gen" id="btn-gen" onclick="generate()">✦ Generate Script</button>
        <button class="btn-copy" id="btn-copy" onclick="copyOut()">Copy Script</button>
      </div>
      <div class="loading" id="loading">Writing your script…</div>
      <div class="error-box" id="err-box">
        <p id="err-msg">Error</p>
      </div>
      <div class="output" id="output">
        <div class="out-label">Generated Script</div>
        <div class="out-text" id="out-text"></div>
      </div>
      <div class="tip">💡 After generating: record naturally → edit in CapCut → add auto-captions → post</div>
    </div>`;
}

async function generate() {
  const key = getKey();
  if (!key || !key.startsWith('sk-')) {
    document.getElementById('err-box').style.display = 'block';
    document.getElementById('err-msg').innerHTML = '⚠️ Please enter your Anthropic API key above first. Get one free at <a href="https://platform.anthropic.com/api-keys" target="_blank">platform.anthropic.com/api-keys</a>';
    return;
  }

  const T = TYPES[cur];
  const vals = getVals();
  const prompt = T.q(vals);

  const btn = document.getElementById('btn-gen');
  const loading = document.getElementById('loading');
  const output = document.getElementById('output');
  const outText = document.getElementById('out-text');
  const copyBtn = document.getElementById('btn-copy');
  const errBox = document.getElementById('err-box');

  btn.disabled = true;
  loading.style.display = 'block';
  output.style.display = 'none';
  copyBtn.style.display = 'none';
  errBox.style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();

    if (data.error) {
      errBox.style.display = 'block';
      document.getElementById('err-msg').innerHTML = `⚠️ API error: ${data.error.message}. Check your API key is correct and has credits.`;
    } else {
      const text = data.content?.map(b => b.text || '').join('') || 'Error generating — please try again.';
      outText.textContent = text;
      output.style.display = 'block';
      copyBtn.style.display = 'inline-block';
    }
  } catch (e) {
    errBox.style.display = 'block';
    document.getElementById('err-msg').innerHTML = '⚠️ Connection failed. Make sure your API key is saved and try again.';
  }

  btn.disabled = false;
  loading.style.display = 'none';
}

function copyOut() {
  navigator.clipboard.writeText(document.getElementById('out-text').textContent).then(() => {
    const b = document.getElementById('btn-copy');
    b.textContent = 'Copied!';
    setTimeout(() => b.textContent = 'Copy Script', 1500);
  });
}
</script>
</body>
</html>
